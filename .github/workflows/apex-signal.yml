name: Investment Strategy Signals

# ── Schedule ─────────────────────────────────────────────────────────────────
# All times UTC.  US Eastern: EDT = UTC-4 (Mar–Nov), EST = UTC-5 (Nov–Mar).
#
#  Every run sends ONE combined HTML email: APEX signal + NOVA Bear Monitor.
#
#  Slot              ET time         UTC cron          Purpose
#  ──────────────    ──────────      ────────────────  ────────────────────────
#  Sunday evening    8:00 PM Sun     0  0  * * 1       Weekly plan + semi risk
#  Monday pre-mkt    9:00 AM Mon     2  13 * * 1       Confirm before execution
#  Daily pre-mkt     9:00 AM Tu-Fr   2  13 * * 2-5     Intra-week signal check
#  Daily after-cls   4:15 PM Mo-Fr   15 20 * * 1-5     Trailing stop + bear mon
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '0 0 * * 1'       # Sun 8 PM ET  → Mon 00:00 UTC  (weekly)
    - cron: '2 13 * * 1'      # Mon 9 AM ET  → Mon 13:02 UTC  (pre-market)
    - cron: '2 13 * * 2-5'    # Tu-Fr 9 AM ET → 13:02 UTC     (daily confirm)
    - cron: '15 20 * * 1-5'   # Mo-Fr 4:15 PM ET → 20:15 UTC  (after-close)
  workflow_dispatch:

jobs:
  combined-signal:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ─────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 3. APEX Layer 0 — FRED margin data (quarterly, idempotent) ─
      - name: Refresh APEX Layer 0
        working-directory: strategy
        run: python sp500_margin_tracker.py --save
        continue-on-error: true

      # ── 4. NOVA Layer 0 — semiconductor cycle (quarterly, idempotent)
      - name: Refresh NOVA Layer 0
        working-directory: strategy
        run: python soxx_cycle_tracker.py --save
        continue-on-error: true

      # ── 5. Check 13F portfolio filings (logged here; also runs inside email builder) ──
      - name: Check portfolio 13F filings
        working-directory: strategy
        run: python portfolio_tracker.py
        continue-on-error: true

      # ── 6. Build combined HTML email (subject + body) ─────────────
      - name: Build email
        id: email
        working-directory: notifications
        run: |
          python email_builder.py > /tmp/email_output.json
          python - <<'PYEOF'
          import json, os
          with open("/tmp/email_output.json") as f:
              data = json.load(f)
          subject = data["subject"]
          body    = data["body"]
          with open("/tmp/email_body.html", "w") as f:
              f.write(body)
          gho = os.environ["GITHUB_OUTPUT"]
          with open(gho, "a") as f:
              f.write(f"subject={subject}\n")
          print(f"Subject: {subject}")
          print(f"Body length: {len(body)} chars")
          PYEOF

      # ── 7. Send combined HTML email ────────────────────────────────
      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: ${{ steps.email.outputs.subject }}
          to: ${{ vars.EMAIL_TO }}
          from: Investment Signals <${{ secrets.GMAIL_USER }}>
          html_body: file:///tmp/email_body.html
